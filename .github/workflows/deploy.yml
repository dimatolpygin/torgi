name: Deploy

on:
  push:
    branches: [master]
    # Docs-/markdown-коммиты не пересобирают бота на проде (иначе клиентке каждый
    # раз летит «бот запущен»). Деплой только при изменениях кода.
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.INSTALL_DIR || '/opt/bron-bot' }}
            git fetch --all
            git reset --hard origin/master
            docker compose up -d --build
            docker image prune -f
